<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Funes - Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #a2d2ff, #cdb4db);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      position: relative;
      display: flex;
      align-items: center;
      padding: 1rem;
      background: #4a4e69;
      color: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }

    header h2 {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      margin: 0;
      font-size: 1.6rem;
      pointer-events: none;
    }

    .chat-box {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.5rem; 
    }

    .message {
      max-width: 70%;
      padding: 0.8rem;
      border-radius: 12px;
    }

    .child {
      background: #00d290;
      align-self: flex-end;
      color: #000000;
    }

    .robot {
      background: #32b0fe;
      color: #000000;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      padding: 0.8rem;
      background: transparent;
      border-top: 1px solid #ccc;
      justify-content: center;
      gap: 0.5rem;
      border-radius: 1%;
      border: 1px solid black;
    }

    input[type="text"] {
      flex: 1;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    button {
      padding: 0.8rem 1.2rem;
      border: none;
      border-radius: 8px;
      background: #4a4e69;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      z-index: 3;
    }

    button:hover {
      background: #22223b;
    }

    .typing {
      display: flex;
      gap: 5px;
      padding: 0.8rem;
      border-radius: 12px;
      background: #32b0fe;
      color: #000;
      align-self: flex-start;
      width: fit-content;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1.4s infinite both;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes blink {
      0% { opacity: 0.2; transform: translateY(0); }
      20% { opacity: 1; transform: translateY(-3px); }
      100% { opacity: 0.2; transform: translateY(0); }
    }

  </style>
</head>
<body>
  <header>
    <button id="exitBtn">Esci</button>
    <h2>Funes</h2>
  </header>

  <div class="chat-box" id="chatBox"></div>

  <div class="input-area" id="inputArea">
    <input type="text" id="childInput" placeholder="Scrivi un messaggio...">
    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
  </div>

<script>
const chatBox = document.getElementById('chatBox');
let waitingForRobot = false;

// Enter key = send message
document.getElementById("childInput").addEventListener("keypress", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    document.getElementById("sendBtn").click();
  }
});

function addMessage(text, sender) {
  const msg = document.createElement("div"); 
  msg.classList.add("message", sender);
  msg.innerText = text;
  chatBox.appendChild(msg);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// prima risposta robot
window.onload = async function() {
  showTyping();
  const response = await fetch("/chat/start");
  const data = await response.json();
  addMessage(data.robot, "robot");
  hideTyping();
}

// invio messaggio
document.getElementById("sendBtn").addEventListener("click", async () => {
  if (waitingForRobot) return;
  const input = document.getElementById("childInput");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  addMessage(text, "child");

  waitingForRobot = true;
  showTyping();
  const response = await fetch("/chat/send_message", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ message: text })
  });
  const data = await response.json();
  hideTyping();
  addMessage(data.robot, "robot");
  waitingForRobot = false;
});

// exit chat
document.getElementById("exitBtn").addEventListener("click", async () => {
  await fetch("/chat/exit", { method: "POST" });
  window.location.href = "/";
});

function showTyping() {
  const typing = document.createElement("div");
  typing.classList.add("message", "typing");
  typing.setAttribute("id", "typingIndicator");
  typing.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  chatBox.appendChild(typing);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function hideTyping() {
  const typing = document.getElementById("typingIndicator");
  if (typing) typing.remove();
}
</script>

</body>
</html>
